name: promoreel
description: PromoReel — Business Video Maker for small businesses worldwide
publish_to: 'none'
version: 1.0.2+2

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State management (no code-gen variant)
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Video / FFmpeg
  ffmpeg_kit_flutter_new: ^4.1.0

  # File handling
  path_provider: ^2.1.5
  path: ^1.9.0

  # Sharing
  share_plus: ^10.1.2

  # Local storage
  shared_preferences: ^2.3.3
  sqflite: ^2.4.2
  sqlite3_flutter_libs: ^0.5.24

  # In-app purchases
  in_app_purchase: ^3.2.0

  # Ads (free tier)
  google_mobile_ads: ^5.2.0

  # Media picking (photos, videos, branding logo) — uses Android Photo Picker on 13+
  image_picker: ^1.1.2

  # In-app video playback
  video_player: ^2.9.2

  # Video thumbnail generation
  video_thumbnail: ^0.5.3

  # Music preview playback
  audioplayers: ^6.1.0

  # QR code generation
  qr_flutter: ^4.1.0

  # Voice-over recording
  record: ^5.2.0

  # Utilities
  uuid: ^4.5.1
  collection: ^1.19.0

  cupertino_icons: ^1.0.8

dependency_overrides:
  record_platform_interface: 1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/motion_styles/
    - assets/music/
